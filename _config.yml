  avatar           : "profile.png"
  name             : "Junteng Liu"
  pronouns         : "he/him"
  bio              : "First-year PhD candidate in Computer Science at Hong Kong University of Science and Technology (HKUST) NLP Group. Graduated from Shanghai Jiao Tong University (SJTU) in June 2024. Research focuses on natural language processing and machine learning, with interests in LLM Reasoning, Reinforcement Learning, Hallucination in Vision-Language Models (VLM), and LLM truthfulness and Interpretability."
  location         : "Hong Kong, China"
  employer         : "HKUST NLP Group"
  uri              : "https://weichencs.github.io"
  email            : "jliugi@connect.ust.hk"

  # Academic websites
